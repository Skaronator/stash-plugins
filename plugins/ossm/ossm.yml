name: OSSM
description: Route interactive funscript playback to an OSSM device over Web Bluetooth.
version: 0.1.0
url: https://github.com/stashapp/stash
ui:
  javascript:
    - ossm.js

settings:
  enableOSSM:
    displayName: Enable OSSM playback
    description: Use OSSM instead of Handy for interactive scenes in this browser.
    type: BOOLEAN
  latencyCompensation:
    displayName: Enable OSSM latency compensation
    description: Writes true to the OSSM latency compensation characteristic after connection. Only enable this if commands are streamed at the same cadence as their time values.
    type: BOOLEAN
  deviceNamePrefix:
    displayName: OSSM device name prefix
    description: Bluetooth device name prefix used when requesting the OSSM device.
    type: STRING
